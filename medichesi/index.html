<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1">
<meta name="theme-color" content="#050505">
<title>MEDIC // HESI Prep</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,500;0,9..144,600;0,9..144,700;1,9..144,400;1,9..144,600&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  :root {
    --bg: #050505;
    --bg-1: #0a0a0a;
    --bg-2: #111111;
    --bg-3: #181818;
    --border: #1e1e1e;
    --border-2: #2a2a2a;
    --border-3: #3a3a3a;
    --text: #fafafa;
    --text-2: #a0a0a0;
    --text-3: #666666;
    --text-4: #444444;
    --accent: #ef4444;
    --success: #10b981;
    --warning: #f59e0b;
    
    /* Per-section accents */
    --c-airway: #06b6d4;
    --c-cardio: #ef4444;
    --c-trauma: #f59e0b;
    --c-medical: #10b981;
    --c-ops: #a78bfa;
    
    --font-display: 'Fraunces', Georgia, serif;
    --font-body: 'Inter', -apple-system, sans-serif;
    --font-mono: 'JetBrains Mono', monospace;
  }
  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    min-height: 100vh;
    overscroll-behavior: none;
  }
  
  /* Grain / texture overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    pointer-events: none;
    opacity: 0.03;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
    z-index: 1000;
    mix-blend-mode: overlay;
  }
  
  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }
  .label { font-family: var(--font-mono); font-size: 10px; font-weight: 500; text-transform: uppercase; letter-spacing: 0.14em; color: var(--text-3); }
  .label-accent { color: var(--accent); }
  
  /* Layout */
  .app { max-width: 760px; margin: 0 auto; padding: 18px; padding-bottom: 120px; position: relative; z-index: 1; }
  @media (min-width: 768px) { .app { padding: 32px; padding-bottom: 120px; } }
  
  /* Topbar */
  .topbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 4px 0 18px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 28px;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 10px;
    font-family: var(--font-mono);
    font-weight: 500;
    font-size: 12px;
    letter-spacing: 0.16em;
  }
  .brand .dot {
    width: 8px; height: 8px;
    background: var(--success);
    border-radius: 50%;
    box-shadow: 0 0 12px var(--success);
    animation: livepulse 1.4s ease-in-out infinite;
  }
  @keyframes livepulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.85); }
  }
  .brand .slash { color: var(--accent); }
  .topbar-actions { display: flex; gap: 6px; }
  .icon-btn {
    width: 34px; height: 34px;
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    color: var(--text-2);
    transition: all 0.15s;
  }
  .icon-btn:hover { border-color: var(--border-3); color: var(--text); }
  
  /* Hero */
  .hero {
    position: relative;
    padding: 36px 28px 28px;
    margin-bottom: 32px;
    background: linear-gradient(180deg, #0c0c0c 0%, #070707 100%);
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
  }
  .hero-grid {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(to right, rgba(255,255,255,0.015) 1px, transparent 1px),
      linear-gradient(to bottom, rgba(255,255,255,0.015) 1px, transparent 1px);
    background-size: 32px 32px;
    pointer-events: none;
    mask-image: radial-gradient(ellipse at top, black 30%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse at top, black 30%, transparent 80%);
  }
  .hero-content { position: relative; z-index: 2; }
  .hero-top-label {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 14px;
  }
  .hero-top-label .tick { width: 20px; height: 1px; background: var(--accent); }
  .hero h1 {
    font-family: var(--font-display);
    font-weight: 500;
    font-size: clamp(34px, 8vw, 52px);
    line-height: 0.98;
    letter-spacing: -0.03em;
    margin-bottom: 6px;
    font-variation-settings: "opsz" 144;
  }
  .hero h1 .em {
    font-style: italic;
    font-weight: 400;
    color: var(--accent);
  }
  .hero .sub {
    color: var(--text-2);
    font-size: 15px;
    line-height: 1.5;
    max-width: 420px;
    margin-top: 14px;
  }
  .hero .sub .sub-em { color: var(--text); font-weight: 500; }
  
  /* ECG line decoration */
  .ecg-wrap {
    position: relative;
    height: 50px;
    margin: 20px 0 20px;
    border-top: 1px solid var(--border);
    border-bottom: 1px solid var(--border);
    overflow: hidden;
    background: rgba(0,0,0,0.3);
  }
  .ecg-line {
    position: absolute;
    top: 0; left: 0;
    height: 100%;
    width: 200%;
    animation: ecgscroll 3.5s linear infinite;
  }
  @keyframes ecgscroll {
    from { transform: translateX(0); }
    to { transform: translateX(-50%); }
  }
  .ecg-line svg { width: 100%; height: 100%; display: block; }
  .ecg-readout {
    position: absolute;
    right: 12px; top: 50%;
    transform: translateY(-50%);
    z-index: 2;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--success);
    padding: 3px 8px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 4px;
    letter-spacing: 0.1em;
  }
  
  /* Stats */
  .hero-stats {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-top: 20px;
  }
  .stat {
    padding: 14px 14px 12px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 10px;
  }
  .stat .num {
    font-family: var(--font-mono);
    font-size: 26px;
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .stat .lbl {
    font-family: var(--font-mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-3);
    margin-top: 6px;
  }
  
  /* Section divider */
  .divider {
    display: flex;
    align-items: center;
    gap: 12px;
    margin: 28px 0 16px;
  }
  .divider-line { flex: 1; height: 1px; background: var(--border); }
  
  /* Categories */
  .categories { display: flex; flex-direction: column; gap: 10px; }
  .cat-card {
    position: relative;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px 22px;
    cursor: pointer;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    text-align: left;
    width: 100%;
    display: block;
    overflow: hidden;
  }
  .cat-card::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--cat-color, var(--accent));
    opacity: 0.6;
    transition: all 0.2s;
  }
  .cat-card:hover {
    border-color: var(--border-3);
    transform: translateX(2px);
    background: var(--bg-2);
  }
  .cat-card:hover::before { opacity: 1; width: 4px; }
  .cat-card:active { transform: translateX(0); }
  
  .cat-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 14px;
    margin-bottom: 16px;
  }
  .cat-icon-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .cat-icon {
    width: 38px; height: 38px;
    border-radius: 10px;
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--cat-color, var(--accent));
    flex-shrink: 0;
  }
  .cat-num {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-3);
    letter-spacing: 0.1em;
    margin-bottom: 3px;
  }
  .cat-name {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 500;
    letter-spacing: -0.01em;
    line-height: 1.15;
    font-variation-settings: "opsz" 48;
  }
  .cat-desc {
    font-size: 13px;
    color: var(--text-2);
    line-height: 1.5;
    margin-bottom: 14px;
    max-width: 92%;
  }
  
  .cat-progress-wrap { display: flex; gap: 14px; }
  .pg { flex: 1; }
  .pg-top {
    display: flex;
    justify-content: space-between;
    margin-bottom: 6px;
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .pg-top .pg-lbl { color: var(--text-3); }
  .pg-top .pg-val { color: var(--text); }
  .pg-bar {
    height: 3px;
    background: var(--bg-3);
    border-radius: 2px;
    overflow: hidden;
  }
  .pg-fill {
    height: 100%;
    background: var(--cat-color, var(--accent));
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .pg-fill.done { background: var(--success); box-shadow: 0 0 8px rgba(16,185,129,0.5); }
  
  /* Category detail view */
  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    color: var(--text-2);
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 24px;
    padding: 8px 0;
    transition: color 0.15s;
  }
  .back-btn:hover { color: var(--text); }
  
  .detail-header {
    margin-bottom: 28px;
    padding-bottom: 24px;
    border-bottom: 1px solid var(--border);
  }
  .detail-num-row {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 14px;
  }
  .detail-num {
    font-family: var(--font-mono);
    font-size: 11px;
    letter-spacing: 0.12em;
    color: var(--detail-color, var(--accent));
  }
  .detail-num-line { flex: 1; height: 1px; background: var(--border); }
  .detail-header h2 {
    font-family: var(--font-display);
    font-size: clamp(28px, 6vw, 38px);
    font-weight: 500;
    letter-spacing: -0.02em;
    line-height: 1.05;
    font-variation-settings: "opsz" 96;
    margin-bottom: 10px;
  }
  .detail-header p { color: var(--text-2); font-size: 15px; line-height: 1.55; }
  
  .mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 28px; }
  .mode-card {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 20px;
    text-align: left;
    transition: all 0.2s;
    cursor: pointer;
    position: relative;
    overflow: hidden;
  }
  .mode-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at top right, var(--detail-color, var(--accent)) 0%, transparent 60%);
    opacity: 0;
    transition: opacity 0.25s;
  }
  .mode-card:hover { border-color: var(--border-3); transform: translateY(-2px); }
  .mode-card:hover::before { opacity: 0.06; }
  .mode-icon {
    color: var(--detail-color, var(--accent));
    margin-bottom: 14px;
    opacity: 0.9;
  }
  .mode-name {
    font-family: var(--font-display);
    font-size: 18px;
    font-weight: 500;
    margin-bottom: 4px;
    letter-spacing: -0.01em;
  }
  .mode-desc { font-size: 12px; color: var(--text-3); margin-bottom: 14px; line-height: 1.5; }
  .mode-stat {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text);
    padding-top: 12px;
    border-top: 1px solid var(--border);
    letter-spacing: 0.06em;
  }
  
  .strategy-box {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px;
    position: relative;
  }
  .strategy-box .label { margin-bottom: 10px; color: var(--detail-color, var(--accent)); }
  .strategy-box .strategy-text {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 16px;
    line-height: 1.55;
    color: var(--text);
    font-weight: 400;
  }
  .strategy-box .strategy-text .emph { font-style: normal; font-weight: 600; color: var(--detail-color, var(--accent)); }
  
  /* Flashcards */
  .progress-top {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 18px;
  }
  .progress-top-num {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--text-2);
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  .progress-top-num strong { color: var(--text); font-weight: 500; }
  .progress-bar-top {
    flex: 1;
    height: 2px;
    background: var(--bg-3);
    border-radius: 2px;
    overflow: hidden;
  }
  .progress-bar-top .pg-fill { background: var(--detail-color, var(--accent)); }
  
  .flashcard {
    position: relative;
    min-height: 340px;
    background: linear-gradient(180deg, var(--bg-1) 0%, var(--bg) 100%);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 40px 28px 60px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    cursor: pointer;
    transition: all 0.2s;
    overflow: hidden;
  }
  .flashcard:hover { border-color: var(--border-2); }
  .flashcard::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--detail-color, var(--accent)), transparent);
    opacity: 0.5;
  }
  .flashcard .side-label {
    position: absolute;
    top: 18px;
    left: 20px;
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--detail-color, var(--accent));
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .flashcard .side-label::before {
    content: '';
    width: 4px; height: 4px;
    background: var(--detail-color, var(--accent));
    border-radius: 50%;
  }
  .flashcard .card-counter {
    position: absolute;
    top: 18px;
    right: 20px;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-3);
    letter-spacing: 0.1em;
  }
  .flashcard .tap-hint {
    position: absolute;
    bottom: 20px;
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--text-4);
  }
  .card-front {
    font-family: var(--font-display);
    font-size: clamp(22px, 5vw, 28px);
    font-weight: 500;
    letter-spacing: -0.015em;
    line-height: 1.25;
    font-variation-settings: "opsz" 72;
  }
  .card-back {
    font-family: var(--font-body);
    font-size: 16px;
    line-height: 1.65;
    color: var(--text);
    max-width: 520px;
  }
  @media (min-width: 768px) {
    .flashcard { padding: 56px 40px 68px; min-height: 400px; }
    .card-back { font-size: 17px; }
  }
  
  .card-controls {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-top: 14px;
  }
  .btn {
    padding: 15px 18px;
    border-radius: 12px;
    font-family: var(--font-body);
    font-weight: 500;
    font-size: 14px;
    transition: all 0.15s;
    border: 1px solid var(--border);
    background: var(--bg-1);
    color: var(--text);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }
  .btn:hover { border-color: var(--border-3); background: var(--bg-2); }
  .btn-primary { background: var(--detail-color, var(--accent)); border-color: var(--detail-color, var(--accent)); color: #fff; }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-success { background: rgba(16,185,129,0.08); border-color: rgba(16,185,129,0.25); color: var(--success); }
  .btn-success:hover { background: rgba(16,185,129,0.14); border-color: var(--success); }
  .btn-miss { background: rgba(239,68,68,0.08); border-color: rgba(239,68,68,0.25); color: #f87171; }
  .btn-miss:hover { background: rgba(239,68,68,0.14); border-color: var(--accent); }
  
  /* Quiz */
  .question {
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 24px 24px 26px;
    margin-bottom: 12px;
    position: relative;
    overflow: hidden;
  }
  .question::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 1px;
    background: var(--detail-color, var(--accent));
    opacity: 0.4;
  }
  .q-label-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 14px;
  }
  .q-num {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--detail-color, var(--accent));
  }
  .q-total {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-3);
    letter-spacing: 0.08em;
  }
  .q-text {
    font-family: var(--font-display);
    font-size: clamp(17px, 3.6vw, 20px);
    font-weight: 500;
    line-height: 1.4;
    letter-spacing: -0.01em;
    font-variation-settings: "opsz" 48;
  }
  
  .options { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
  .option {
    padding: 16px 18px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-radius: 12px;
    text-align: left;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    font-size: 15px;
    line-height: 1.45;
    width: 100%;
  }
  .option:hover:not(.disabled) {
    border-color: var(--detail-color, var(--accent));
    background: var(--bg-2);
    transform: translateX(2px);
  }
  .opt-letter {
    width: 28px; height: 28px;
    border-radius: 8px;
    background: var(--bg-3);
    border: 1px solid var(--border-2);
    color: var(--text-2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: var(--font-mono);
    font-weight: 500;
    font-size: 12px;
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .option:hover:not(.disabled) .opt-letter { border-color: var(--detail-color, var(--accent)); color: var(--text); }
  .option.correct { border-color: rgba(16,185,129,0.5); background: rgba(16,185,129,0.06); }
  .option.correct .opt-letter { background: var(--success); border-color: var(--success); color: #000; }
  .option.wrong { border-color: rgba(239,68,68,0.5); background: rgba(239,68,68,0.06); }
  .option.wrong .opt-letter { background: var(--accent); border-color: var(--accent); color: #fff; }
  .option.disabled { cursor: default; }
  .option.disabled:hover { transform: none; }
  
  .explanation {
    margin-top: 4px;
    margin-bottom: 14px;
    padding: 20px 22px;
    background: var(--bg-1);
    border: 1px solid var(--border);
    border-left: 2px solid var(--detail-color, var(--accent));
    border-radius: 10px;
  }
  .exp-header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
  }
  .exp-label {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--detail-color, var(--accent));
  }
  .exp-status {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: 0.1em;
    padding: 3px 8px;
    border-radius: 4px;
  }
  .exp-status.correct { background: rgba(16,185,129,0.1); color: var(--success); border: 1px solid rgba(16,185,129,0.3); }
  .exp-status.wrong { background: rgba(239,68,68,0.1); color: #f87171; border: 1px solid rgba(239,68,68,0.3); }
  .explanation p {
    font-size: 14.5px;
    line-height: 1.65;
    color: var(--text);
  }
  
  /* Complete */
  .complete {
    background: linear-gradient(180deg, var(--bg-1) 0%, var(--bg) 100%);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 48px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .complete::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 60%;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--detail-color, var(--accent)), transparent);
  }
  .complete .complete-label { margin-bottom: 18px; }
  .complete .score {
    font-family: var(--font-mono);
    font-size: 64px;
    font-weight: 500;
    letter-spacing: -0.03em;
    line-height: 1;
    margin-bottom: 10px;
  }
  .complete .score.pass { color: var(--success); }
  .complete .score.fail { color: var(--warning); }
  .complete h3 {
    font-family: var(--font-display);
    font-size: 22px;
    font-weight: 500;
    margin-bottom: 6px;
    letter-spacing: -0.01em;
  }
  .complete .complete-sub { color: var(--text-2); font-size: 14px; margin-bottom: 28px; }
  .complete .btn-group { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
  
  /* Modal */
  .modal-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.82);
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 20px;
    animation: fadeIn 0.2s ease;
  }
  .modal {
    background: var(--bg-1);
    border: 1px solid var(--border-2);
    border-radius: 16px;
    padding: 26px;
    max-width: 420px;
    width: 100%;
  }
  .modal h3 {
    font-family: var(--font-display);
    font-size: 20px;
    font-weight: 500;
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }
  .modal p { color: var(--text-2); font-size: 14px; line-height: 1.55; margin-bottom: 22px; }
  .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }
  
  /* Footer */
  .footer-note {
    margin-top: 48px;
    padding-top: 20px;
    border-top: 1px solid var(--border);
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--text-4);
    text-transform: uppercase;
    letter-spacing: 0.12em;
    text-align: center;
    line-height: 1.8;
  }
  
  /* Animations */
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeInSlow { from { opacity: 0; } to { opacity: 1; } }
  .fade-in { animation: fadeIn 0.3s ease; }
  .fade-in-slow { animation: fadeInSlow 0.5s ease; }
  .stagger > *:nth-child(1) { animation: fadeIn 0.3s 0s both ease; }
  .stagger > *:nth-child(2) { animation: fadeIn 0.3s 0.05s both ease; }
  .stagger > *:nth-child(3) { animation: fadeIn 0.3s 0.1s both ease; }
  .stagger > *:nth-child(4) { animation: fadeIn 0.3s 0.15s both ease; }
  .stagger > *:nth-child(5) { animation: fadeIn 0.3s 0.2s both ease; }
</style>

const CATEGORIES = [
  {
    id: 'airway', color: 'var(--c-airway)', icon: ICONS.lung,
    name: 'Airway, Respiration & Ventilation',
    short: 'Airway',
    desc: 'Upper and lower airway, ventilation parameters, respiratory failure, pediatric airway.',
    flashcards: [
      { front: 'Adult tidal volume target for ventilation', back: '6 to 8 mL/kg ideal body weight. Avoid overventilation, it decreases preload and venous return.' },
      { front: 'Pediatric uncuffed ETT size formula', back: '(Age / 4) + 4 mm. Cuffed: (Age / 4) + 3.5. Depth at lip: tube size x 3.' },
      { front: 'BVM rate in adult cardiac arrest with advanced airway', back: '1 breath every 6 seconds (10/min). Continuous compressions, no pause.' },
      { front: 'BVM rate in peds with pulse and no advanced airway', back: '1 breath every 2 to 3 seconds (20 to 30/min). Adult with pulse no airway: 1 every 5 to 6 sec.' },
      { front: 'Hypoxic vs hypercapnic respiratory failure', back: 'Type 1 hypoxic: PaO2 under 60 (oxygenation problem, ARDS, pneumonia). Type 2 hypercapnic: PaCO2 over 50 (ventilation problem, COPD, OD).' },
      { front: 'Epiglottitis: key signs and first action', back: 'Tripod, drooling, stridor, muffled voice, fever, looks toxic. Do NOT inspect airway. Keep calm, blow-by O2, rapid transport, be ready for surgical airway.' },
      { front: 'Silent chest in severe asthma means what', back: 'Impending respiratory failure. Air movement is so minimal there is no wheeze. Get aggressive, prepare to intubate.' },
      { front: 'CPAP indications and minimum BP', back: 'CHF pulmonary edema, COPD exacerbation, pneumonia. Patient must be awake, cooperative, able to protect airway, SBP over 90.' },
      { front: 'What PEEP does physiologically', back: 'Increases functional residual capacity, recruits collapsed alveoli, improves oxygenation. Can decrease preload and drop BP.' },
      { front: 'Combi-Tube inflation volumes', back: 'Proximal blue pharyngeal balloon: 100 mL. Distal white distal balloon: 15 mL.' },
      { front: 'Pertussis presentation and infection control', back: 'Paroxysmal coughing fits with inspiratory whoop, post-tussive emesis. Droplet precautions. Common in unvaccinated peds.' },
      { front: 'Cystic fibrosis prehospital concerns', back: 'Thick mucus, chronic infection, pneumothorax risk, hemoptysis. Suction carefully, watch for tension pneumo, gentle ventilation.' },
      { front: 'Home ventilator key parameters', back: 'Tidal volume (6 to 8 mL/kg), rate, FiO2, PEEP (usually 5), I:E ratio (typically 1:2). If dependent patient crashes, disconnect vent and bag.' },
      { front: 'Pediatric tracheostomy emergency: decannulation', back: 'If tube out: attempt reinsertion with same size or one size smaller. If cannot reinsert: cover stoma and bag via mouth OR bag directly over stoma if upper airway obstructed.' }
    ],
    scenarios: [
      { q: 'You respond for a 4-year-old with sudden fever, drooling, tripod positioning, and inspiratory stridor. Mom says he would not eat dinner and seems to be getting worse. What is your priority action?', opts: ['Attempt direct visualization of the airway with a laryngoscope', 'Keep the child calm in position of comfort with blow-by oxygen and transport rapidly', 'Begin aggressive BVM ventilation to prevent respiratory failure', 'Establish IV access and administer IM epinephrine 0.3 mg'], ans: 1, exp: 'Classic epiglottitis. Agitation or airway manipulation can trigger complete obstruction. Keep the child calm, let the parent hold them, give blow-by O2, transport rapidly to a facility able to perform surgical airway. Do not inspect, do not force an IV if it upsets them.' },
      { q: 'A 68-year-old with known COPD is in respiratory distress. RR 28, SpO2 86% on room air, using accessory muscles, speaking three words at a time, alert and cooperative, SBP 138. Next step?', opts: ['Intubate with RSI', 'Apply CPAP at 5 cm H2O', 'Begin BVM-assisted ventilation', 'Place on NRB at 15 LPM only'], ans: 1, exp: 'He meets every CPAP criterion: awake, cooperative, can protect his airway, SBP over 90. CPAP reduces work of breathing, improves oxygenation, and often prevents intubation in COPD. An NRB alone does not address work of breathing.' },
      { q: 'You are ventilating a 30-year-old adult in cardiac arrest. You just placed a supraglottic airway. What is your ventilation rate?', opts: ['1 breath every 2 seconds', '1 breath every 3 to 4 seconds', '1 breath every 6 seconds', '1 breath every 10 seconds'], ans: 2, exp: '10 breaths per minute, one every 6 seconds, with continuous compressions (no pause for ventilations). Hyperventilation during arrest kills by increasing intrathoracic pressure and decreasing coronary perfusion.' },
      { q: 'A severe asthmatic stops wheezing, becomes drowsy, and her SpO2 drops. What does this silent chest indicate?', opts: ['The treatment is working', 'Improvement in bronchospasm', 'Impending respiratory arrest', 'Developing pneumothorax'], ans: 2, exp: 'Silent chest in severe asthma means air movement is minimal. She is crashing. Prepare for aggressive ventilation and intubation. Continue bronchodilators, consider IM epinephrine, magnesium if available.' },
      { q: 'A 6-year-old requires intubation. Using standard formulas, what uncuffed ETT size do you select?', opts: ['4.5 mm', '5.0 mm', '5.5 mm', '6.5 mm'], ans: 2, exp: '(Age / 4) + 4 = (6/4) + 4 = 5.5 mm. Depth at lip roughly 16.5 cm (size x 3).' },
      { q: 'You have a ventilator-dependent patient at home whose SpO2 is dropping and who appears agitated. The ventilator is cycling normally. What do you do first?', opts: ['Increase the FiO2 on the ventilator', 'Disconnect the ventilator and bag the patient with 100% O2', 'Administer a sedative to calm the patient', 'Check the ventilator tubing for leaks'], ans: 1, exp: 'DOPE mnemonic: Displacement, Obstruction, Pneumothorax, Equipment failure. When in doubt with a vent patient, take them off the machine and bag. This rules out equipment and lets you feel compliance directly.' }

  },
  {
    id: 'cardio', color: 'var(--c-cardio)', icon: ICONS.heart,
    name: 'Cardiology',
    short: 'Cardio',
    desc: 'ACS, dysrhythmias, cardiac arrest, post-ROSC care, hypertensive and hypotensive emergencies.',
    flashcards: [
      { front: 'STEMI ECG criteria', back: 'ST elevation over 1 mm in 2 or more contiguous limb leads, or over 2 mm precordial V2-V3 (men) / 1.5 mm (women). New LBBB in ischemic context is STEMI equivalent.' },
      { front: 'Mobitz I vs Mobitz II', back: 'Mobitz I (Wenckebach): PR progressively lengthens until a beat drops. Usually benign. Mobitz II: constant PR with random dropped beats. High risk, can progress to complete block. Pacer pads on.' },
      { front: 'Bundle branch block recognition', back: 'QRS over 0.12 s. LBBB: broad R in V6, deep QS in V1 (William). RBBB: RSR prime in V1 (rabbit ears), wide S in V6 (Marrow).' },
      { front: 'Shockable rhythms in cardiac arrest', back: 'VF and pulseless VT only. Defibrillate, resume compressions immediately, epi 1 mg IV q 3 to 5 min, amiodarone 300 mg then 150 mg (or lidocaine).' },
      { front: 'Post-ROSC priorities', back: 'Airway/ventilation (SpO2 92 to 98%, EtCO2 35 to 40). BP SBP over 90 or MAP over 65 (fluids then pressors, norepi). 12-lead looking for STEMI. Targeted temp mgmt. Treat cause.' },
      { front: 'Life-threatening chest pain differentials', back: 'ACS, aortic dissection, pulmonary embolism, tension pneumothorax, cardiac tamponade, esophageal rupture (Boerhaave).' },
      { front: 'Hypertensive emergency vs urgency', back: 'Emergency: high BP WITH end-organ damage (CVA, MI, pulmonary edema, dissection, eclampsia). Urgency: high BP alone. Emergency needs controlled reduction, not an aggressive drop.' },
      { front: 'Starling law of the heart', back: 'Force of ventricular contraction is proportional to end-diastolic fiber length. More preload equals stronger contraction, up to a point.' },
      { front: 'Preload vs afterload definitions', back: 'Preload: volume in ventricles at end-diastole (stretch). Afterload: resistance the ventricle pumps against (SVR for LV, PVR for RV).' },
      { front: 'Cardiogenic shock presentation', back: 'Pump failure. Hypotension with tachycardia, cold clammy skin, pulmonary edema with crackles, JVD. Cautious fluids, norepinephrine, consider inotropes.' },
      { front: 'Aortic dissection classic signs', back: 'Tearing or ripping chest pain radiating to back, BP differential between arms, pulse deficit, widened mediastinum on CXR. Marfan, uncontrolled HTN risk.' },
      { front: 'Manual defibrillation: paddles vs pads', back: 'Pads preferred. Hands-free, continuous monitoring, better contact, safer for provider. Paddles require pressure and gel, higher energy loss.' }
    ],
    scenarios: [
      { q: 'A 62-year-old male has crushing substernal chest pain radiating to his left jaw for 45 minutes. BP 158/92, HR 88, SpO2 96%. His 12-lead shows 3 mm ST elevation in II, III, and aVF. What is your priority after ASA and monitor?', opts: ['Administer sublingual nitroglycerin', 'Perform a right-sided 12-lead ECG', 'Give morphine 4 mg IV for pain', 'Start an amiodarone drip'], ans: 1, exp: 'Inferior STEMI in II, III, aVF. Always rule out RV infarct with a right-sided 12-lead (V4R). If RV is involved, preload dependent: avoid nitro, give fluids. Nitro in RV infarct can crash the BP.' },
      { q: 'Your monitor shows a rhythm with regular P waves, PR intervals that progressively lengthen, then a dropped QRS, then the cycle repeats. Patient is asymptomatic, BP 128/76, HR 68. What is the rhythm and action?', opts: ['Mobitz II, apply pacer pads', 'Third-degree block, begin transcutaneous pacing', 'Mobitz I (Wenckebach), monitor and transport', 'Normal sinus with PACs, no treatment'], ans: 2, exp: 'Wenckebach. Progressive PR lengthening before a dropped beat is classic. Usually benign, often AV nodal origin. Monitor, do not need to pace unless symptomatic.' },
      { q: 'You arrive to an unresponsive patient in VF. You deliver one shock. What is your very next action?', opts: ['Check pulse and rhythm', 'Immediately resume chest compressions for 2 minutes', 'Give epinephrine 1 mg IV', 'Intubate and ventilate'], ans: 1, exp: 'After any shock, resume compressions immediately. No pulse check, no rhythm check. The myocardium is stunned and needs perfusion. Reassess rhythm at the end of the 2-minute cycle.' },
      { q: 'A 58-year-old has sudden severe tearing chest pain radiating to his back. BP is 210/120 in the right arm, 170/90 in the left arm. What is the most likely diagnosis?', opts: ['Acute myocardial infarction', 'Aortic dissection', 'Pulmonary embolism', 'Tension pneumothorax'], ans: 1, exp: 'Tearing/ripping pain radiating to the back with a BP differential between arms is classic aortic dissection. Treat the BP carefully, do not give lytics, surgical emergency.' },
      { q: 'Post-ROSC, your patient has a SBP of 78, HR 118, SpO2 94% bagged. What is your next intervention?', opts: ['Begin norepinephrine drip immediately', 'Give a 500 mL crystalloid bolus and reassess', 'Intubate for airway protection', 'Defibrillate in case of recurrent VF'], ans: 1, exp: 'Start with a fluid bolus. Post-ROSC hypotension is common and fluids are first line if not overloaded. If BP remains low after fluid, start norepinephrine to target MAP over 65.' },
      { q: 'A 72-year-old has a BP of 220/118, a headache, and new-onset left-sided weakness. What is this and what is the priority?', opts: ['Hypertensive urgency, give oral antihypertensive', 'Hypertensive emergency with stroke, rapid transport to stroke center', 'Migraine with aura, give antiemetics', 'Bell palsy, reassure and transport non-emergent'], ans: 1, exp: 'End-organ damage (neurologic deficit) with high BP is hypertensive emergency. With stroke symptoms, do not aggressively lower BP in the field. Rapid transport to a stroke-capable facility, establish last known well time.' }
    ]
  },
  {
    id: 'trauma', color: 'var(--c-trauma)', icon: ICONS.cross,
    name: 'Trauma & Neurology',
    short: 'Trauma/Neuro',
    desc: 'Stroke, shock, bleeding control, chest and abdominal and ortho trauma, multisystem.',
    flashcards: [
      { front: 'Common stroke mimics', back: 'Hypoglycemia, seizure with Todd paralysis, Bell palsy, migraine with aura, sepsis with encephalopathy, toxic ingestion, hypoxia.' },
      { front: 'Bell palsy vs stroke facial differentiation', back: 'Bell palsy affects the ENTIRE half of the face including the forehead. Stroke (central CN VII) SPARES the forehead due to bilateral cortical innervation.' },
      { front: 'Neurogenic shock findings', back: 'Hypotension PLUS bradycardia PLUS warm dry skin below injury. Loss of sympathetic tone from high cord injury (typically above T6).' },
      { front: 'Spinal shock vs neurogenic shock', back: 'Spinal shock: temporary loss of reflexes/motor/sensory below injury (neurologic, resolves over days to weeks). Neurogenic shock: hemodynamic (hypotension from loss of sympathetic tone).' },
      { front: 'Tension pneumothorax signs', back: 'JVD, tracheal deviation AWAY from affected side, absent breath sounds, hyperresonance, hypotension. Decompress: 2nd ICS midclavicular OR 5th ICS anterior axillary line.' },
      { front: 'Beck triad of cardiac tamponade', back: 'Hypotension, JVD, muffled heart sounds. Often pulsus paradoxus and narrow pulse pressure too.' },
      { front: 'Flail chest definition', back: 'Two or more adjacent ribs broken in two or more places, creating a free segment with paradoxical movement. Main threat is the underlying pulmonary contusion.' },
      { front: 'Cushing triad (increased ICP)', back: 'Hypertension (widening pulse pressure), bradycardia, irregular respirations (Cheyne-Stokes or similar). Late and ominous sign.' },
      { front: 'Hemorrhagic shock classes', back: 'I: under 15% loss, normal vitals. II: 15 to 30%, tachycardia. III: 30 to 40%, hypotension/altered. IV: over 40%, near arrest.' },
      { front: 'Pelvic fracture bleeding risk', back: 'Can lose 1 to 2 L into the pelvis. Apply a pelvic binder at the greater trochanters, permissive hypotension, rapid transport to a trauma center.' },
      { front: 'Cavitation in ballistic trauma', back: 'Temporary and permanent cavities. High-velocity rounds create a larger temporary cavity that damages tissue well beyond the bullet track. Matters most in elastic tissue like muscle, less in dense organs.' },
      { front: 'Blast injury phases', back: 'Primary: pressure wave (air-filled organs, lungs, ears, bowel). Secondary: fragments/projectiles. Tertiary: body thrown. Quaternary: burns, crush, inhalation.' }
    ],
    scenarios: [
      { q: 'A 66-year-old presents with sudden right-sided weakness, slurred speech, and a BP of 190/100. Her daughter says she was normal 45 minutes ago. Her finger stick is 38 mg/dL. What do you do?', opts: ['Rapid transport to a stroke center, do not treat the glucose', 'Administer D10 (or D50), reassess neurologic status, then decide on stroke center', 'Give aspirin 324 mg and transport', 'Administer nitroglycerin to lower the blood pressure'], ans: 1, exp: 'Hypoglycemia is the most common stroke mimic. Correct the glucose first. If the deficit resolves, it was hypoglycemia. If it persists, treat as stroke with rapid transport and last known well time.' },
      { q: 'A 24-year-old is hypotensive (BP 82/54) and bradycardic (HR 48) after a diving injury. Skin is warm and dry below the nipple line. What type of shock is this?', opts: ['Hemorrhagic shock', 'Neurogenic shock', 'Cardiogenic shock', 'Anaphylactic shock'], ans: 1, exp: 'Hypotension plus bradycardia plus warm/dry skin below injury is textbook neurogenic shock. Loss of sympathetic tone from a high cord injury. Fluids are first line but often need vasopressors to restore vascular tone.' },
      { q: 'A 28-year-old male was stabbed in the left chest. He is hypotensive, JVD is present, breath sounds are equal bilaterally, heart sounds are muffled, HR 128. What is the most likely diagnosis?', opts: ['Tension pneumothorax', 'Hemothorax', 'Cardiac tamponade', 'Flail chest'], ans: 2, exp: 'Beck triad: hypotension, JVD, muffled heart sounds. With equal breath sounds, it is not tension pneumo. Rapid transport, notify receiving for pericardiocentesis or thoracotomy.' },
      { q: 'A patient with severe head trauma now has a BP of 190/70, HR of 48, and irregular respirations. What does this represent?', opts: ['Neurogenic shock', 'Cushing triad with rising ICP', 'Hemorrhagic shock', 'Spinal shock'], ans: 1, exp: 'Cushing triad. Hypertension with widened pulse pressure, bradycardia, irregular respirations all reflect critically rising intracranial pressure. Elevate head of bed 30 degrees, mild hyperventilation only if herniating, rapid transport.' },
      { q: 'A motorcycle rider was ejected. Pelvis is unstable on exam, BP 88/52, HR 132. Skin is pale and diaphoretic. Your priority intervention on scene?', opts: ['Full spinal immobilization then depart', 'Apply a pelvic binder at the greater trochanters and begin rapid transport', 'Start two large-bore IVs and push 2 L of crystalloid before moving', 'Request air medical and wait on scene'], ans: 1, exp: 'Binder first. Pelvic fractures bleed massively. Binder plus rapid transport plus permissive hypotension (SBP around 90) plus TXA if in your scope. Fluid resuscitation on scene wastes minutes he does not have.' },
      { q: 'You arrive to a patient with a GSW to the right chest. Breath sounds are absent on the right, trachea is deviated left, JVD is present, BP 80/50, SpO2 84%. What do you do first?', opts: ['Intubate the patient', 'Needle decompression in the 2nd intercostal space midclavicular line on the right', 'Seal the wound and transport', 'Start a large-bore IV and push fluids'], ans: 1, exp: 'Tension pneumothorax. Decompress immediately. Intubation and positive pressure ventilation before decompression will worsen the tension. Seal any open wound with a vented chest seal after decompression.' }
    ]
  },
  {
    id: 'medical', color: 'var(--c-medical)', icon: ICONS.pill,
    name: 'Medical & Special Populations',
    short: 'Medical',
    desc: 'OB, endocrine, neurologic and abdominal emergencies, toxicology, psych, peds and geriatrics.',
    flashcards: [
      { front: 'Ectopic pregnancy presentation', back: 'Unilateral lower abdominal/pelvic pain, vaginal bleeding (often minimal), positive pregnancy test, hypotension if ruptured. Kehr sign (referred shoulder pain) suggests intraperitoneal blood.' },
      { front: 'Abruptio placentae vs placenta previa', back: 'Abruption: PAINFUL, dark blood, rigid/tender uterus, fetal distress, can be concealed. Previa: PAINLESS bright red bleeding, soft uterus. NEVER do vaginal exam with suspected previa.' },
      { front: 'APGAR scoring', back: 'At 1 and 5 minutes. Appearance, Pulse, Grimace, Activity, Respirations. Each scored 0 to 2, total out of 10. Under 7 needs intervention, under 4 needs resuscitation.' },
      { front: 'Umbilical cord vessels', back: 'Two arteries (deoxygenated from fetus to placenta) and one vein (oxygenated from placenta to fetus). AVA.' },
      { front: 'DKA vs HHS', back: 'DKA: typically type 1, BG 300 to 600, ketones positive, acidosis, Kussmaul respirations, fruity breath. HHS: typically type 2, BG over 600, minimal ketones, profound dehydration, altered mental status, older patients.' },

/* ============================================================
   STATE & STORAGE
   ============================================================ */

const STORAGE_KEY = 'medic_hesi_progress_v1';

function loadProgress() {
  try {
    const stored = localStorage.getItem(STORAGE_KEY);
    if (stored) return JSON.parse(stored);
  } catch (e) {}
  return { flashcards: {}, quizzes: {} };
}
function saveProgress() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state.progress)); } catch (e) {}
}
function resetProgress() {
  state.progress = { flashcards: {}, quizzes: {} };
  saveProgress();
}

const state = {
  view: 'home',
  categoryId: null,
  cardIndex: 0,
  cardFlipped: false,
  quizIndex: 0,
  quizAnswers: [],
  progress: loadProgress(),
  showResetModal: false
};

/* ============================================================
   HELPERS
   ============================================================ */

function getCategory(id) { return CATEGORIES.find(c => c.id === id); }

function getCategoryProgress(cat) {
  const known = cat.flashcards.filter((f, i) => state.progress.flashcards[cat.id + '_f_' + i] === 'known').length;
  const quizCorrect = cat.scenarios.filter((s, i) => {
    const r = state.progress.quizzes[cat.id + '_q_' + i];
    return r && r.correct;
  }).length;
  return {
    flashcardsKnown: known,
    flashcardsTotal: cat.flashcards.length,
    quizCorrect, quizTotal: cat.scenarios.length
  };
}

function getOverallProgress() {
  let cards = 0, cardsTotal = 0, quizzes = 0, quizzesTotal = 0;
  CATEGORIES.forEach(cat => {
    const p = getCategoryProgress(cat);
    cards += p.flashcardsKnown;
    cardsTotal += p.flashcardsTotal;
    quizzes += p.quizCorrect;
    quizzesTotal += p.quizTotal;
  });
  return { cards, cardsTotal, quizzes, quizzesTotal };
}

function navigate(view, opts = {}) {
  state.view = view;
  if (opts.categoryId !== undefined) state.categoryId = opts.categoryId;
  state.cardIndex = 0;
  state.cardFlipped = false;
  state.quizIndex = 0;
  state.quizAnswers = [];
  render();
  window.scrollTo(0, 0);
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c]));
}

function pad2(n) { return String(n).padStart(2, '0'); }

/* ============================================================
   RENDER
   ============================================================ */

function render() {
  const app = document.getElementById('app');
  let html = renderTopbar();
  if (state.view === 'home') html += renderHome();
  else if (state.view === 'category') html += renderCategory();
  else if (state.view === 'flashcards') html += renderFlashcards();
  else if (state.view === 'quiz') html += renderQuiz();
  html += renderFooter();
  if (state.showResetModal) html += renderResetModal();
  app.innerHTML = html;
  attachHandlers();
}

function renderTopbar() {
  return `
    <div class="topbar">
      <div class="brand">
        <span class="dot"></span>
        <span>MEDIC <span class="slash">//</span> HESI</span>
      </div>
      <div class="topbar-actions">
        <button class="icon-btn" data-action="reset" title="Reset progress">${ICONS.reset}</button>
      </div>
    </div>
  `;
}

  let html = `

    const p = getCategoryProgress(cat);

    const qPct = p.quizTotal ? (p.quizCorrect / p.quizTotal) * 100 : 0;
    html += `
      <button class="cat-card" data-action="open-category" data-id="${cat.id}" style="--cat-color: ${cat.color};">

          </div>
          <div class="pg">
            <div class="pg-top"><span class="pg-lbl">Quiz</span><span class="pg-val">${p.quizCorrect}/${p.quizTotal}</span></div>

function renderCategory() {
  const cat = getCategory(state.categoryId);
  const idx = CATEGORIES.indexOf(cat);
  const p = getCategoryProgress(cat);
  
  return `
    <button class="back-btn" data-action="home">← Back to Sections</button>
    <div class="detail-header fade-in" style="--detail-color: ${cat.color};">
      <div class="detail-num-row">
        <span class="detail-num">SEC // ${pad2(idx + 1)} // ${escapeHtml(cat.short.toUpperCase())}</span>
        <span class="detail-num-line"></span>
      </div>
      <h2>${escapeHtml(cat.name)}</h2>
      <p>${escapeHtml(cat.desc)}</p>
    </div>
    
    <div class="mode-grid" style="--detail-color: ${cat.color};">
      <button class="mode-card" data-action="start-flashcards">
        <div class="mode-icon">${ICONS.cards}</div>
        <div class="mode-name">Flashcards</div>
        <div class="mode-desc">Facts, dosing, signs, formulas. Tap to flip, mark known.</div>
        <div class="mode-stat">${p.flashcardsKnown} / ${p.flashcardsTotal} KNOWN</div>
      </button>
      <button class="mode-card" data-action="start-quiz">
        <div class="mode-icon">${ICONS.target}</div>
        <div class="mode-name">Scenarios</div>

    <div class="strategy-box" style="--detail-color: ${cat.color};">

        For every scenario ask: <span class="emph">what is the most immediate life threat?</span> Then, <span class="emph">what action comes first?</span> And finally, <span class="emph">what would cause harm if delayed?</span> Do not just memorize. Know the why.
      </div>
    </div>
  `;
}

function renderFlashcards() {
  const cat = getCategory(state.categoryId);
  const cards = cat.flashcards;
  const idx = state.cardIndex;
  
  if (idx >= cards.length) {
    const known = cards.filter((f, i) => state.progress.flashcards[cat.id + '_f_' + i] === 'known').length;
    const pct = Math.round((known / cards.length) * 100);
    return `
      <button class="back-btn" data-action="open-category" data-id="${cat.id}">← Back to ${escapeHtml(cat.short)}</button>
      <div class="complete fade-in" style="--detail-color: ${cat.color};">
        <div class="label complete-label">Set Complete</div>
        <div class="score ${pct >= 80 ? 'pass' : 'fail'}">${pct}%</div>
        <h3>Flashcard set complete</h3>
        <div class="complete-sub">${known} of ${cards.length} marked as known</div>
        <div class="btn-group">
          <button class="btn btn-primary" data-action="restart-flashcards">Run it again</button>
          <button class="btn" data-action="open-category" data-id="${cat.id}">Done</button>
        </div>
      </div>
    `;
  }
  
  const card = cards[idx];
  const pct = (idx / cards.length) * 100;
  
  return `
    <button class="back-btn" data-action="open-category" data-id="${cat.id}">← Exit</button>
    <div style="--detail-color: ${cat.color};">
      <div class="progress-top">
        <div class="progress-top-num"><strong>${pad2(idx + 1)}</strong> of ${pad2(cards.length)}</div>
        <div class="progress-bar-top"><div class="pg-fill" style="width: ${pct}%"></div></div>
        <div class="progress-top-num">${escapeHtml(cat.short.toUpperCase())}</div>
      </div>
      <div class="flashcard fade-in" data-action="flip">
        <div class="side-label">${state.cardFlipped ? 'Answer' : 'Prompt'}</div>
        <div class="card-counter">${pad2(idx + 1)}/${pad2(cards.length)}</div>
        <div class="${state.cardFlipped ? 'card-back' : 'card-front'}">${escapeHtml(state.cardFlipped ? card.back : card.front)}</div>
        <div class="tap-hint">${state.cardFlipped ? 'Rate your recall' : 'Tap card to reveal'}</div>
      </div>
      ${state.cardFlipped ? `
        <div class="card-controls">
          <button class="btn btn-miss" data-action="mark-unknown">Need to review</button>
          <button class="btn btn-success" data-action="mark-known">Got it</button>
        </div>
      ` : `
        <div class="card-controls" style="grid-template-columns: 1fr;">
          <button class="btn btn-primary" data-action="flip">Reveal Answer</button>
        </div>
      `}
    </div>
  `;
}

function renderQuiz() {
  const cat = getCategory(state.categoryId);
  const qs = cat.scenarios;
  const idx = state.quizIndex;
  
  if (idx >= qs.length) {
    const correct = state.quizAnswers.filter(a => a.correct).length;
    const pct = Math.round((correct / qs.length) * 100);
    return `
      <button class="back-btn" data-action="open-category" data-id="${cat.id}">← Back to ${escapeHtml(cat.short)}</button>
      <div class="complete fade-in" style="--detail-color: ${cat.color};">
        <div class="label complete-label">Run Complete</div>
        <div class="score ${pct >= 70 ? 'pass' : 'fail'}">${pct}%</div>
        <h3>Scenario set complete</h3>
        <div class="complete-sub">${correct} of ${qs.length} correct on this run</div>
        <div class="btn-group">
          <button class="btn btn-primary" data-action="restart-quiz">Retake</button>
          <button class="btn" data-action="open-category" data-id="${cat.id}">Done</button>
        </div>
      </div>
    `;
  }
  
  const q = qs[idx];
  const answered = state.quizAnswers[idx];
  const pct = (idx / qs.length) * 100;
  const letters = ['A', 'B', 'C', 'D'];
  
  let optsHtml = '';
  q.opts.forEach((opt, i) => {
    let cls = 'option';
    if (answered) {
      cls += ' disabled';
      if (i === q.ans) cls += ' correct';
      else if (i === answered.selected) cls += ' wrong';
    }
    optsHtml += `
      <button class="${cls}" data-action="answer" data-opt="${i}">
        <span class="opt-letter">${letters[i]}</span>
        <span>${escapeHtml(opt)}</span>
      </button>
    `;
  });
  
  return `
    <button class="back-btn" data-action="open-category" data-id="${cat.id}">← Exit</button>
    <div style="--detail-color: ${cat.color};">
      <div class="progress-top">
        <div class="progress-top-num"><strong>${pad2(idx + 1)}</strong> of ${pad2(qs.length)}</div>
        <div class="progress-bar-top"><div class="pg-fill" style="width: ${pct}%"></div></div>
        <div class="progress-top-num">${escapeHtml(cat.short.toUpperCase())}</div>
      </div>
      <div class="question fade-in">
        <div class="q-label-row">
          <span class="q-num">Scenario ${pad2(idx + 1)}</span>
          <span class="q-total">${pad2(idx + 1)} / ${pad2(qs.length)}</span>
        </div>
        <div class="q-text">${escapeHtml(q.q)}</div>
      </div>
      <div class="options">${optsHtml}</div>
      ${answered ? `
        <div class="explanation fade-in">
          <div class="exp-header">
            <span class="exp-label">Rationale</span>
            <span class="exp-status ${answered.correct ? 'correct' : 'wrong'}">${answered.correct ? 'CORRECT' : 'REVIEW THIS'}</span>
          </div>
          <p>${escapeHtml(q.exp)}</p>
        </div>
        <div class="card-controls" style="grid-template-columns: 1fr;">
          <button class="btn btn-primary" data-action="next-quiz">${idx === qs.length - 1 ? 'Finish' : 'Next Scenario'}</button>
        </div>
      ` : ''}
    </div>
  `;
}

function renderResetModal() {
  return `
    <div class="modal-backdrop" data-action="close-modal">
      <div class="modal" onclick="event.stopPropagation()">
        <h3>Reset all progress?</h3>
        <p>This clears every flashcard mark and every scenario result across all sections. This cannot be undone.</p>
        <div class="modal-actions">
          <button class="btn" data-action="close-modal">Cancel</button>
          <button class="btn btn-primary" data-action="confirm-reset">Reset Everything</button>
        </div>
      </div>
    </div>
  `;
}

function renderFooter() {
  return `
    <div class="footer-note">
      Study aid only. Follow your local protocols and official curriculum.<br>
      Built to pass the HESI. Keep working.
    </div>
  `;
}

/* ============================================================
   EVENTS
   ============================================================ */

function attachHandlers() {
  document.querySelectorAll('[data-action]').forEach(el => el.addEventListener('click', handleAction));
}

function handleAction(e) {
  const action = e.currentTarget.dataset.action;
  const id = e.currentTarget.dataset.id;
  const opt = e.currentTarget.dataset.opt;
  
  switch (action) {
    case 'home': navigate('home'); break;
    case 'open-category': navigate('category', { categoryId: id }); break;
    case 'start-flashcards': navigate('flashcards'); break;
    case 'start-quiz': navigate('quiz'); break;
    case 'flip':
      state.cardFlipped = !state.cardFlipped;
      render();
      break;
    case 'mark-known': {
      const cat = getCategory(state.categoryId);
      state.progress.flashcards[cat.id + '_f_' + state.cardIndex] = 'known';
      saveProgress();
      state.cardIndex++;
      state.cardFlipped = false;
      render();
      break;
    }
    case 'mark-unknown': {
      const cat = getCategory(state.categoryId);
      state.progress.flashcards[cat.id + '_f_' + state.cardIndex] = 'review';
      saveProgress();
      state.cardIndex++;
      state.cardFlipped = false;
      render();
      break;
    }
    case 'restart-flashcards':
      state.cardIndex = 0;
      state.cardFlipped = false;
      render();
      break;
    case 'answer': {
      if (state.quizAnswers[state.quizIndex]) return;
      const cat = getCategory(state.categoryId);
      const q = cat.scenarios[state.quizIndex];
      const selected = parseInt(opt);
      const correct = selected === q.ans;
      state.quizAnswers[state.quizIndex] = { selected, correct };
      const key = cat.id + '_q_' + state.quizIndex;
      const prev = state.progress.quizzes[key] || { attempts: 0, correct: false };
      state.progress.quizzes[key] = { attempts: prev.attempts + 1, correct: prev.correct || correct };
      saveProgress();
      render();
      break;
    }
    case 'next-quiz':
      state.quizIndex++;
      render();
      break;
    case 'restart-quiz':
      state.quizIndex = 0;
      state.quizAnswers = [];
      render();
      break;
    case 'reset':
      state.showResetModal = true;
      render();
      break;
    case 'close-modal':
      state.showResetModal = false;
      render();
      break;
    case 'confirm-reset':
      resetProgress();
      state.showResetModal = false;
      navigate('home');
      break;
  }
}

render();
</script>
</body>
</html>
